<div class="auth-wrapper d-flex align-items-center justify-content-center animate-fade-in">
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden forgot-card">
    <div class="bg-gradient-teal py-4 px-4 text-center text-white border-0">
      <div class="forgot-icon-container bg-white text-teal rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3 shadow" style="width: 60px; height: 60px;">
        <i class="bi bi-key-fill" style="font-size: 1.8rem; color: #0fa895;"></i>
      </div>
      <h3 class="fw-bold mb-1 text-white">Password Recovery</h3>
      <p class="text-white-50 small mb-0">Enter your registered email address below</p>
    </div>
    
    <div class="card-body p-4 bg-white">
      <!-- Success/Error Banners -->
      <div *ngIf="successMessage" class="alert alert-success d-flex align-items-center gap-2 mb-3 shadow-sm rounded-3">
        <i class="bi bi-check-circle-fill fs-5"></i>
        <span class="small">{{ successMessage }}</span>
      </div>
      
      <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center gap-2 mb-3 shadow-sm rounded-3">
        <i class="bi bi-exclamation-triangle-fill fs-5"></i>
        <span class="small">{{ errorMessage }}</span>
      </div>

      <!-- Main Form -->
      <form [formGroup]="forgotForm" (ngSubmit)="submit()" *ngIf="!successMessage">
        <div class="mb-4">
          <label for="email" class="form-label small fw-bold text-dark-teal mb-1">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope-fill"></i></span>
            <input type="email" 
                   id="email" 
                   formControlName="email" 
                   class="form-control bg-light-focus border-start-0" 
                   placeholder="name@example.com" 
                   [class.is-invalid]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched" />
          </div>
          <div *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched" class="text-danger small mt-1">
            <span *ngIf="forgotForm.get('email')?.errors?.['required']">Email is required.</span>
            <span *ngIf="forgotForm.get('email')?.errors?.['email']">Please enter a valid email address.</span>
          </div>
        </div>

        <button type="submit" 
                class="btn btn-mint-primary w-100 py-2.5 fw-bold shadow-sm d-flex align-items-center justify-content-center gap-2 border-0 mb-3"
                [disabled]="loading || forgotForm.invalid">
          <span *ngIf="loading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          <span>{{ loading ? 'Sending OTP...' : 'Send OTP' }}</span>
        </button>
      </form>

      <!-- Footer Link -->
      <div class="text-center mt-3">
        <a routerLink="/login" class="text-teal fw-bold small text-decoration-none d-inline-flex align-items-center gap-1.5 hover-link">
          <i class="bi bi-arrow-left"></i>
          <span>Back to Sign In</span>
        </a>
      </div>
    </div>
  </div>
</div>
