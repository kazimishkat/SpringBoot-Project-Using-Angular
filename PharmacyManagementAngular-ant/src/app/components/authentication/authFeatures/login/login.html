<div class="auth-wrapper d-flex align-items-center justify-content-center animate-fade-in">
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden login-card">
    <div class="bg-gradient-teal py-4 px-4 text-center text-white border-0">
      <div class="login-icon-container bg-white text-teal rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3 shadow" style="width: 60px; height: 60px;">
        <i class="bi bi-heart-pulse-fill" style="font-size: 1.8rem; color: #0fa895;"></i>
      </div>
      <h3 class="fw-bold mb-1 text-white">MPhram Pharmacy</h3>
      <p class="text-white-50 small mb-0">Pharmacy Management System</p>
    </div>
    
    <div class="card-body p-4 bg-white">
      <!-- Success/Error Alerts -->
      <div *ngIf="successMessage" class="alert alert-success d-flex align-items-center gap-2 mb-4 shadow-sm rounded-3">
        <i class="bi bi-check-circle-fill fs-5"></i>
        <span class="small">{{ successMessage }}</span>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center gap-2 mb-4 shadow-sm rounded-3">
        <i class="bi bi-exclamation-triangle-fill fs-5"></i>
        <span class="small">{{ errorMessage }}</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <!-- Email Input -->
        <div class="mb-3">
          <label for="email" class="form-label small fw-bold text-dark-teal mb-1">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope-fill"></i></span>
            <input type="email" 
                   id="email" 
                   formControlName="email" 
                   class="form-control bg-light-focus border-start-0" 
                   placeholder="e.g. admin@mphram.com" 
                   [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" />
          </div>
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-danger small mt-1">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email address.</span>
          </div>
        </div>

        <!-- Password Input -->
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="password" class="form-label small fw-bold text-dark-teal mb-0">Password</label>
          </div>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock-fill"></i></span>
            <input [type]="showPassword ? 'text' : 'password'" 
                   id="password" 
                   formControlName="password" 
                   class="form-control bg-light-focus border-horizontal-no" 
                   placeholder="••••••••" 
                   [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" />
            <button type="button" 
                    class="btn btn-light bg-light border-start-0 border text-muted px-3" 
                    (click)="showPassword = !showPassword">
              <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
            </button>
          </div>
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-danger small mt-1">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</span>
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 4 characters long.</span>
          </div>
        </div>

        <!-- Remember Me and Forgot Password -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe" formControlName="rememberMe">
            <label class="form-check-label small text-muted" for="rememberMe">
              Remember Me
            </label>
          </div>
          <a routerLink="/forgot-password" class="text-teal small fw-bold text-decoration-none hover-link">Forgot Password?</a>
        </div>

        <!-- Submit button -->
        <button type="submit" 
                class="btn btn-mint-primary w-100 py-2.5 fw-bold shadow-sm d-flex align-items-center justify-content-center gap-2 border-0"
                [disabled]="loading || loginForm.invalid">
          <span *ngIf="loading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          <span>{{ loading ? 'Signing In...' : 'Login' }}</span>
        </button>
      </form>
    </div>
  </div>
</div>
