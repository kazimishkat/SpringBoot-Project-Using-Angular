<div class="auth-wrapper d-flex align-items-center justify-content-center animate-fade-in">
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden reset-card">
    <div class="bg-gradient-teal py-4 px-4 text-center text-white border-0">
      <div class="reset-icon-container bg-white text-teal rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3 shadow" style="width: 60px; height: 60px;">
        <i class="bi bi-shield-lock" style="font-size: 1.8rem;"></i>
      </div>
      <h3 class="fw-bold mb-1 text-white">Reset Password</h3>
      <p class="text-white-50 small mb-0">Create new staff credentials</p>
    </div>
    
    <div class="card-body p-4 bg-white">
      <!-- Success/Error Banners -->
      <div *ngIf="success" class="alert alert-success d-flex align-items-center gap-2 mb-4 shadow-sm rounded-3">
        <i class="bi bi-check-circle-fill fs-5"></i>
        <div class="d-flex flex-column">
          <span class="fw-bold small">Password Changed Successfully!</span>
          <span class="text-xs text-muted-success">Redirecting you to the sign-in screen...</span>
        </div>
      </div>
      
      <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center gap-2 mb-4 shadow-sm rounded-3">
        <i class="bi bi-exclamation-triangle-fill fs-5"></i>
        <span class="small">{{ errorMessage }}</span>
      </div>

      <!-- Main Form -->
      <form (ngSubmit)="submit()" #resetForm="ngForm" *ngIf="!success">
        <!-- New Password -->
        <div class="mb-3">
          <label for="newPassword" class="form-label small fw-bold text-dark-teal mb-1">New Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock-fill"></i></span>
            <input [type]="showPassword ? 'text' : 'password'" 
                   id="newPassword" 
                   name="newPassword" 
                   class="form-control bg-light-focus border-horizontal-no" 
                   placeholder="At least 4 characters" 
                   [(ngModel)]="newPassword" 
                   required />
            <button type="button" 
                    class="btn btn-light bg-light border-start-0 border text-muted px-3" 
                    (click)="showPassword = !showPassword">
              <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-4">
          <label for="confirmPassword" class="form-label small fw-bold text-dark-teal mb-1">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock-fill"></i></span>
            <input [type]="showPassword ? 'text' : 'password'" 
                   id="confirmPassword" 
                   name="confirmPassword" 
                   class="form-control bg-light-focus border-horizontal-no" 
                   placeholder="Retype password" 
                   [(ngModel)]="confirmPassword" 
                   required />
            <button type="button" 
                    class="btn btn-light bg-light border-start-0 border text-muted px-3" 
                    (click)="showPassword = !showPassword">
              <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
            </button>
          </div>
          <div *ngIf="mismatch" class="text-danger small mt-1 d-flex align-items-center gap-1">
            <i class="bi bi-x-circle-fill"></i>
            <span>Passwords do not match.</span>
          </div>
        </div>

        <!-- Submit button -->
        <button type="submit" 
                class="btn btn-mint-primary w-100 py-2.5 fw-bold shadow-sm d-flex align-items-center justify-content-center gap-2 border-0"
                [disabled]="loading || !newPassword || !confirmPassword || mismatch || !token">
          <span *ngIf="loading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          <span>{{ loading ? 'Saving password...' : 'Update Password' }}</span>
        </button>
      </form>

      <!-- Footer Link -->
      <div class="text-center mt-3" *ngIf="!success">
        <a routerLink="/dashboard/login" class="text-teal fw-bold small text-decoration-none hover-link">
          Back to Sign In
        </a>
      </div>
    </div>
  </div>
</div>
