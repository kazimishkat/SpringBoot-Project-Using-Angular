<div class="auth-wrapper d-flex align-items-center justify-content-center animate-fade-in">
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden unauthorized-card">
    <div class="bg-gradient-teal py-4 px-4 text-center text-white border-0">
      <div class="unauthorized-icon-container bg-white text-teal rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3 shadow" style="width: 68px; height: 68px;">
        <i class="bi bi-shield-slash-fill" style="font-size: 2.2rem; color: #ef4444;"></i>
      </div>
      <h3 class="fw-bold mb-0 text-white">403 - Access Forbidden</h3>
    </div>
    <div class="card-body p-4 bg-white text-center">
      <p class="text-muted mb-4 fs-6 leading-relaxed">
        Your assigned system profile does not have the clearance tier permissions required to interact with this specific pharmacy workspace dashboard section.
      </p>
      
      <div class="d-flex flex-column gap-2.5">
        <button (click)="goBack()" class="btn btn-mint-primary w-100 py-2.5 fw-bold shadow-sm d-flex align-items-center justify-content-center gap-2 border-0">
          <i class="bi bi-house-door-fill"></i>
          <span>Return to Dashboard</span>
        </button>
        <button (click)="logout()" class="btn btn-outline-secondary w-100 py-2.5 fw-bold d-flex align-items-center justify-content-center gap-2">
          <i class="bi bi-box-arrow-right"></i>
          <span>Sign Out</span>
        </button>
      </div>
    </div>
  </div>
</div>
