<div class="auth-wrapper d-flex align-items-center justify-content-center animate-fade-in">
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden verify-card">
    
    <!-- Header Section -->
    <div class="bg-gradient-teal py-4 px-4 text-center text-white border-0">
      <div class="verify-icon-container bg-white text-teal rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3 shadow" style="width: 60px; height: 60px;">
        <i class="bi bi-patch-check-fill" style="font-size: 1.8rem; color: #0fa895;"></i>
      </div>
      <h3 class="fw-bold mb-1 text-white">Email Verification</h3>
      <p class="text-white-50 small mb-0">Activating your account credentials</p>
    </div>
    
    <!-- Body Section -->
    <div class="card-body p-4 bg-white text-center">

      <!-- State 1: Loading Indicator -->
      <div *ngIf="loading" class="py-4">
        <div class="spinner-border text-teal mb-3" style="width: 3rem; height: 3rem;" role="status">
          <span class="visually-hidden">Verifying...</span>
        </div>
        <h5 class="fw-bold text-dark-teal mb-2">Verifying Your Account</h5>
        <p class="text-muted small mb-0">Please wait while we validate your verification token...</p>
      </div>

      <!-- State 2: Success Message Banner -->
      <div *ngIf="!loading && successMessage" class="py-3">
        <div class="alert alert-success d-flex flex-column align-items-center gap-2 mb-4 p-3 shadow-sm rounded-3 border-0 bg-light-success">
          <i class="bi bi-check-circle-fill text-success fs-1"></i>
          <h5 class="fw-bold text-success mb-0">Verified Successfully!</h5>
          <span class="small text-muted leading-relaxed">{{ successMessage }}</span>
        </div>
      </div>
      
      <!-- State 3: Error Message Banner -->
      <div *ngIf="!loading && errorMessage" class="py-3">
        <div class="alert alert-danger d-flex flex-column align-items-center gap-2 mb-4 p-3 shadow-sm rounded-3 border-0 bg-light-danger">
          <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
          <h5 class="fw-bold text-danger mb-0">Verification Failed</h5>
          <span class="small text-muted leading-relaxed">{{ errorMessage }}</span>
        </div>
      </div>

      <!-- Navigation Actions -->
      <div class="mt-3 border-top pt-3">
        <a routerLink="/login" class="btn btn-mint-primary w-100 py-2.5 fw-bold shadow-sm d-flex align-items-center justify-content-center gap-2 border-0">
          <i class="bi bi-box-arrow-in-right fs-5"></i>
          <span>Proceed to Sign In</span>
        </a>
      </div>

    </div>
  </div>
</div>
