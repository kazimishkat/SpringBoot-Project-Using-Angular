<div class="container-fluid py-3 animate-fade-in">
  <!-- Page Header -->
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
    <div>
      <h3 class="fw-bold text-dark-teal mb-1">
        {{ isDialogMode ? 'Quick Add Customer' : 'Add New Customer' }}
      </h3>
      <p class="text-muted mb-0 small">Register a new customer profile for walk-in transactions or online portal access.</p>
    </div>
    <div class="d-flex gap-2">
      <button type="button" (click)="cancel()" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1">
        <i class="bi bi-x-circle"></i>
        <span>{{ isDialogMode ? 'Close' : 'Cancel' }}</span>
      </button>
    </div>
  </div>

  <!-- Error Notification Banner -->
  <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center gap-2 mb-3 shadow-sm rounded-3">
    <i class="bi bi-exclamation-triangle-fill fs-5"></i>
    <span class="small">{{ errorMessage }}</span>
  </div>

  <!-- Customer Form Card -->
  <form #customerForm="ngForm" (ngSubmit)="saveCustomer()" novalidate>
    <div class="row g-3">

      <!-- Left Column: Personal Information & Photo -->
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-3 mb-3">
          <div class="card-header bg-transparent border-bottom py-2">
            <h6 class="fw-bold text-dark-teal mb-0">
              <i class="bi bi-person-lines-fill me-2"></i>Personal Details
            </h6>
          </div>
          <div class="card-body p-3">
            <div class="row g-3">

              <!-- Full Name -->
              <div class="col-md-6">
                <label for="name" class="form-label fw-semibold text-dark-teal small">Full Name <span class="text-danger">*</span></label>
                <div class="input-group input-group-sm">
                  <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                  <input type="text" 
                         id="name" 
                         name="name" 
                         class="form-control" 
                         placeholder="Enter full name" 
                         [(ngModel)]="customerRequest.name" 
                         #name="ngModel" 
                         required 
                         [class.is-invalid]="(name.invalid && (name.touched || submitted))" />
                </div>
                <div *ngIf="name.invalid && (name.touched || submitted)" class="invalid-feedback d-block extra-small">
                  Full name is required.
                </div>
              </div>

              <!-- Phone Number -->
              <div class="col-md-6">
                <label for="phone" class="form-label fw-semibold text-dark-teal small">Phone Number <span class="text-danger">*</span></label>
                <div class="input-group input-group-sm">
                  <span class="input-group-text bg-light"><i class="bi bi-telephone"></i></span>
                  <input type="tel" 
                         id="phone" 
                         name="phone" 
                         class="form-control" 
                         placeholder="e.g. 01700000000" 
                         [(ngModel)]="customerRequest.phone" 
                         #phone="ngModel" 
                         required 
                         [class.is-invalid]="(phone.invalid && (phone.touched || submitted))" />
                </div>
                <div *ngIf="phone.invalid && (phone.touched || submitted)" class="invalid-feedback d-block extra-small">
                  Phone number is required.
                </div>
              </div>

              <!-- Email Address -->
              <div class="col-md-6">
                <label for="email" class="form-label fw-semibold text-dark-teal small">Email Address</label>
                <div class="input-group input-group-sm">
                  <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                  <input type="email" 
                         id="email" 
                         name="email" 
                         class="form-control" 
                         placeholder="e.g. customer@example.com" 
                         [(ngModel)]="customerRequest.email" />
                </div>
              </div>

              <!-- Gender -->
              <div class="col-md-3">
                <label for="gender" class="form-label fw-semibold text-dark-teal small">Gender</label>
                <select id="gender" name="gender" class="form-select form-select-sm" [(ngModel)]="customerRequest.gender">
                  <option [ngValue]="undefined">Select Gender</option>
                  <option *ngFor="let g of genders" [value]="g">{{ g }}</option>
                </select>
              </div>

              <!-- Age -->
              <div class="col-md-3">
                <label for="age" class="form-label fw-semibold text-dark-teal small">Age</label>
                <input type="number" 
                       id="age" 
                       name="age" 
                       class="form-control form-control-sm" 
                       placeholder="Years" 
                       min="1" 
                       max="120" 
                       [(ngModel)]="customerRequest.age" />
              </div>

            </div>
          </div>
        </div>

        <!-- Address Collapsible / Simple Section -->
        <div class="card border-0 shadow-sm rounded-3 mb-3" *ngIf="customerRequest.address">
          <div class="card-header bg-transparent border-bottom py-2">
            <h6 class="fw-bold text-dark-teal mb-0">
              <i class="bi bi-geo-alt-fill me-2"></i>Address Details
            </h6>
          </div>
          <div class="card-body p-3">
            <div class="row g-2">
              <div class="col-md-6">
                <input type="text" id="addressLine1" name="addressLine1" class="form-control form-control-sm" placeholder="Address Line 1" [(ngModel)]="customerRequest.address.addressLine1" />
              </div>
              <div class="col-md-6">
                <input type="text" id="city" name="city" class="form-control form-control-sm" placeholder="City" [(ngModel)]="customerRequest.address.city" />
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Right Column: Profile Picture Upload & Actions -->
      <div class="col-lg-4">
        <!-- Photo Upload Card -->
        <div class="card border-0 shadow-sm rounded-3 mb-3 text-center">
          <div class="card-body p-3">
            <div class="avatar-preview-container mx-auto mb-2">
              <img *ngIf="imagePreview; else defaultAvatar" [src]="imagePreview" alt="Customer Preview" class="w-100 h-100 object-fit-cover rounded-circle shadow-sm" />
              <ng-template #defaultAvatar>
                <div class="default-avatar-placeholder d-flex align-items-center justify-content-center rounded-circle bg-mint text-dark-teal fw-bold fs-2">
                  <i class="bi bi-person-fill"></i>
                </div>
              </ng-template>
            </div>
            <label class="btn btn-outline-primary btn-sm rounded-pill px-3 cursor-pointer">
              <i class="bi bi-upload me-1"></i> Upload Photo
              <input type="file" (change)="onFileSelected($event)" accept="image/*" class="d-none" />
            </label>
          </div>
        </div>

        <!-- Submit Controls Card -->
        <div class="card border-0 shadow-sm rounded-3 p-3">
          <button type="submit" class="btn btn-mint-primary w-100 py-2 mb-2 d-flex align-items-center justify-content-center gap-2 fw-semibold">
            <i class="bi bi-check-circle-fill"></i>
            <span>{{ isDialogMode ? 'Save & Select' : 'Register Customer' }}</span>
          </button>
          <button type="button" (click)="resetForm()" class="btn btn-light text-muted w-100 py-1.5 d-flex align-items-center justify-content-center gap-2 small">
            <i class="bi bi-arrow-counterclockwise"></i>
            <span>Reset</span>
          </button>
        </div>
      </div>

    </div>
  </form>
</div>
