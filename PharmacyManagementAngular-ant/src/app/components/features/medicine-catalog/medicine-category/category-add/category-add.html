<div class="container-fluid p-0 animate-fade-in">
  <!-- Page Header -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h3 class="fw-bold text-dark-teal mb-1">Add Medicine Category</h3>
      <p class="text-muted small mb-0">Create new drug classification boundaries and therapeutic categories for catalog indexing.</p>
    </div>
    <div>
      <a routerLink="/dashboard/medicine-categories" class="btn btn-outline-mint d-flex align-items-center gap-2 px-3 py-2 fw-semibold shadow-sm text-decoration-none">
        <i class="bi bi-arrow-left-circle"></i>
        <span>Back to List</span>
      </a>
    </div>
  </div>

  <!-- Alert Messages -->
  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show mb-4 shadow-sm" role="alert">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-exclamation-triangle-fill fs-5"></i>
      <span>{{ errorMessage }}</span>
    </div>
    <button type="button" class="btn-close" (click)="errorMessage = ''" aria-label="Close"></button>
  </div>

  <!-- Add Category Card Form -->
  <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-5">
    <div class="card-header bg-white border-bottom py-3 px-4">
      <h5 class="mb-0 fw-bold text-dark-teal d-flex align-items-center gap-2">
        <i class="bi bi-plus-circle-fill text-teal"></i>
        <span>Create Classification Profile</span>
      </h5>
    </div>

    <div class="card-body p-4">
      <form #categoryForm="ngForm" (ngSubmit)="saveCategory()" novalidate>
        
        <!-- Primary Classification Information -->
        <h6 class="text-teal fw-bold text-uppercase letter-spacing-1 mb-3">Category Information</h6>
        
        <div class="row g-3 mb-4">
          <!-- Name Input -->
          <div class="col-md-6 col-sm-12">
            <label for="categoryName" class="form-label fw-semibold">Category Name <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-tag-fill"></i></span>
              <input type="text" 
                     id="categoryName" 
                     name="name" 
                     class="form-control bg-light-focus border-start-0" 
                     placeholder="e.g. Antibiotics, Analgesics..." 
                     [(ngModel)]="category.name" 
                     #nameInput="ngModel" 
                     required 
                     [class.is-invalid]="nameInput.invalid && (nameInput.dirty || nameInput.touched || submitted)" />
              <div class="invalid-feedback">
                Category name is required.
              </div>
            </div>
          </div>

          <!-- Active Status Switch -->
          <div class="col-md-6 col-sm-12 d-flex align-items-center">
            <div class="form-check form-switch pt-4">
              <input class="form-check-input bg-teal-switch" 
                     type="checkbox" 
                     id="categoryIsActive" 
                     name="isActive" 
                     [(ngModel)]="category.isActive" />
              <label class="form-check-label fw-semibold ms-2 text-dark" for="categoryIsActive">
                Category Active & Allow Child Associations
              </label>
            </div>
          </div>
        </div>

        <!-- Description Input -->
        <div class="mb-4">
          <label for="categoryDescription" class="form-label fw-semibold">Description</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-file-text"></i></span>
            <textarea id="categoryDescription" 
                      name="description" 
                      class="form-control bg-light-focus border-start-0" 
                      rows="4" 
                      placeholder="Specify therapeutic boundaries, usage rules, or classification metadata parameters..." 
                      [(ngModel)]="category.description"></textarea>
          </div>
        </div>

        <!-- Form Actions Footer -->
        <div class="d-flex align-items-center justify-content-end gap-2 pt-3 border-top">
          <button type="button" class="btn btn-outline-secondary px-4 py-2.5 fw-bold" (click)="resetForm()">
            Reset Form
          </button>
          <button type="submit" class="btn btn-mint-primary px-5 py-2.5 fw-bold shadow-sm d-flex align-items-center gap-2">
            <i class="bi bi-cloud-arrow-up-fill"></i>
            <span>Save Category</span>
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
