<div class="container-fluid py-4">
  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h1 class="h3 mb-0 text-gray-800">Sales Returns</h1>
      <p class="text-muted mb-0">Browse and process returned medicine inventory and customer refunds</p>
    </div>
    <button class="btn btn-teal d-flex align-items-center gap-2" (click)="createReturn()">
      <i class="bi bi-plus-circle-fill"></i> New Sales Return
    </button>
  </div>

  <!-- Error Card -->
  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    {{ errorMessage }}
  </div>

  <!-- Filters Block -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-4">
      <div class="row g-3">
        <!-- Search -->
        <div class="col-md-6">
          <label class="form-label text-secondary small fw-medium">Search returns</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0">
              <i class="bi bi-search text-muted"></i>
            </span>
            <input type="text" class="form-control border-start-0" placeholder="Return # or Invoice #..." 
                   [(ngModel)]="searchKeyword" (input)="searchReturns()">
          </div>
        </div>

        <!-- Status Filter -->
        <div class="col-md-4 col-sm-9">
          <label class="form-label text-secondary small fw-medium">Status</label>
          <select class="form-select" [(ngModel)]="selectedStatus" (change)="filterReturns()">
            <option value="">All Statuses</option>
            <option *ngFor="let status of approvalStatuses" [value]="status">{{ status }}</option>
          </select>
        </div>

        <!-- Refresh -->
        <div class="col-md-2 col-sm-3 d-flex align-items-end">
          <button class="btn btn-outline-secondary w-100" (click)="refresh()" title="Refresh List">
            <i class="bi bi-arrow-clockwise"></i> Refresh
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Table Card -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table align-middle mb-0">
          <thead class="table-light text-secondary">
            <tr>
              <th class="ps-4">Return #</th>
              <th>Invoice #</th>
              <th>Return Date</th>
              <th>Status</th>
              <th class="text-end pe-4">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="returns.length === 0">
              <td colspan="5" class="text-center py-5 text-muted">
                <i class="bi bi-file-earmark-spreadsheet fs-1 d-block mb-3"></i>
                No sales returns found.
              </td>
            </tr>
            <tr *ngFor="let ret of returns">
              <td class="ps-4 fw-semibold text-dark">{{ ret.returnNumber }}</td>
              <td>{{ ret.invoiceNumber }}</td>
              <td>{{ ret.returnDate | date:'mediumDate' }}</td>
              <td>
                <span class="badge py-2 px-2.5 text-uppercase" 
                      [ngClass]="{
                        'bg-success-subtle text-success': ret.status === 'APPROVED',
                        'bg-warning-subtle text-warning': ret.status === 'PENDING',
                        'bg-danger-subtle text-danger': ret.status === 'REJECTED' || ret.status === 'CANCELLED'
                      }">
                  {{ ret.status }}
                </span>
              </td>
              <td class="text-end pe-4">
                <button class="btn btn-outline-teal btn-sm" (click)="viewDetails(ret.id)">
                  <i class="bi bi-eye"></i> View details
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
