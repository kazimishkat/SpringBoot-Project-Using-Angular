<div class="container-fluid py-4 animate-fade-in">
  <!-- Page Header -->
  <div class="mb-4">
    <h2 class="fw-bold text-dark-teal">Change Password</h2>
    <p class="text-muted">Update your account security parameters and pass phrases.</p>
  </div>

  <!-- Success/Error Banners -->
  <div *ngIf="successMessage" class="alert alert-success d-flex align-items-center gap-2 mb-4 shadow-sm rounded-3">
    <i class="bi bi-check-circle-fill fs-5"></i>
    <span class="small">{{ successMessage }}</span>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center gap-2 mb-4 shadow-sm rounded-3">
    <i class="bi bi-exclamation-triangle-fill fs-5"></i>
    <span class="small">{{ errorMessage }}</span>
  </div>

  <!-- Main Card Form -->
  <div class="card border-0 shadow-sm rounded-3 max-width-card mx-auto">
    <div class="card-body p-4">
      <form #pwdForm="ngForm" (ngSubmit)="changePassword()" novalidate>
        <div class="row g-3">
          
          <!-- Current Password -->
          <div class="col-12">
            <label for="currentPassword" class="form-label small fw-bold text-dark-teal mb-1">Current Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-shield-lock-fill"></i></span>
              <input type="password" 
                     id="currentPassword" 
                     name="currentPassword"
                     class="form-control bg-light-focus border-start-0" 
                     placeholder="Enter current password"
                     [(ngModel)]="pwdRequest.currentPassword" 
                     required
                     #currentPwdField="ngModel"
                     [class.is-invalid]="(currentPwdField.invalid && (currentPwdField.touched || submitted))" />
              <div class="invalid-feedback">Current password is required.</div>
            </div>
          </div>

          <!-- New Password -->
          <div class="col-md-6">
            <label for="newPassword" class="form-label small fw-bold text-dark-teal mb-1">New Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-key-fill"></i></span>
              <input type="password" 
                     id="newPassword" 
                     name="newPassword"
                     class="form-control bg-light-focus border-start-0" 
                     placeholder="Min 4 characters"
                     [(ngModel)]="pwdRequest.newPassword" 
                     required
                     minlength="4"
                     #newPwdField="ngModel"
                     [class.is-invalid]="(newPwdField.invalid && (newPwdField.touched || submitted))" />
              <div class="invalid-feedback">New password must be at least 4 characters long.</div>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="col-md-6">
            <label for="confirmPassword" class="form-label small fw-bold text-dark-teal mb-1">Confirm New Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-key-fill"></i></span>
              <input type="password" 
                     id="confirmPassword" 
                     name="confirmPassword"
                     class="form-control bg-light-focus border-start-0" 
                     placeholder="Retype new password"
                     [(ngModel)]="pwdRequest.confirmPassword" 
                     required
                     #confirmPwdField="ngModel"
                     [class.is-invalid]="((confirmPwdField.invalid || pwdRequest.newPassword !== pwdRequest.confirmPassword) && (confirmPwdField.touched || submitted))" />
              <div class="invalid-feedback" *ngIf="confirmPwdField.errors?.['required']">Confirm password is required.</div>
              <div class="invalid-feedback" *ngIf="!confirmPwdField.errors?.['required'] && pwdRequest.newPassword !== pwdRequest.confirmPassword">
                Passwords do not match.
              </div>
            </div>
          </div>

        </div>

        <!-- Form Actions buttons bar -->
        <div class="d-flex justify-content-end gap-2.5 mt-4 pt-3 border-top">
          <button type="button" (click)="goBack()" class="btn btn-outline-secondary px-4 py-2">
            Cancel
          </button>
          <button type="button" (click)="resetForm()" class="btn btn-light px-4 py-2 text-dark-teal fw-semibold">
            Reset
          </button>
          <button type="submit" class="btn btn-mint-primary px-4 py-2">
            Update Password
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
