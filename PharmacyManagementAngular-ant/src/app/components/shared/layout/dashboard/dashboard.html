<div class="dashboard-wrapper d-flex">
  <!-- Sidebar Panel -->
  <aside class="dashboard-sidebar-container d-none d-lg-block h-100 position-sticky top-0">
    <app-sidebar></app-sidebar>
  </aside>

  <!-- Main Workspace Area -->
  <div class="dashboard-workspace flex-grow-1 d-flex flex-column min-vh-100">
    
    <!-- Topbar Header -->
    <header class="dashboard-topbar d-flex align-items-center justify-content-between px-4 py-3 bg-white border-bottom shadow-sm">
      <div class="d-flex align-items-center gap-3">
        <!-- Mobile Sidebar Toggle button -->
        <button class="btn d-lg-none p-0 text-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" aria-controls="mobileSidebar">
          <i class="bi bi-list fs-2"></i>
        </button>
        
        <div class="workspace-title-area">
          <nav aria-label="breadcrumb" class="d-none d-md-block">
            <ol class="breadcrumb mb-1">
              <li class="breadcrumb-item"><a routerLink="/" class="text-teal text-decoration-none">MPhram</a></li>
              <li class="breadcrumb-item active" aria-current="page">Portal</li>
            </ol>
          </nav>
          <h4 class="mb-0 fw-bold text-dark-teal">System Portal</h4>
        </div>
      </div>

      <!-- Right Toolbar Tools -->
      <div class="topbar-actions d-flex align-items-center gap-3">
        <!-- Quick stats or shortcuts -->
        <div class="d-none d-sm-flex align-items-center gap-2 text-muted small pe-3 border-end">
          <i class="bi bi-clock-history"></i>
          <span>Session: <strong>Active</strong></span>
        </div>

        <!-- Admin Role Badge -->
        <div class="admin-role-pill d-flex align-items-center gap-2.5 py-1.5 px-3 bg-teal-light rounded-pill">
          <span class="pulse-indicator-dot"></span>
          <span class="role-text fw-bold text-dark-teal text-uppercase">Role: Admin</span>
        </div>
      </div>
    </header>

    <!-- Scrollable Router Outlet Canvas -->
    <main class="dashboard-content-canvas flex-grow-1 p-4 bg-light-teal">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>

<!-- Mobile Sidebar Offcanvas -->
<div class="offcanvas offcanvas-start bg-teal-dark text-white p-0" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel" style="width: 260px;">
  <div class="offcanvas-header justify-content-end p-2 border-bottom border-secondary">
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body p-0 h-100">
    <app-sidebar></app-sidebar>
  </div>
</div>
